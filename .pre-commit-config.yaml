repos:
  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --new-from-rev HEAD --fix
        language: golang
        types: [go]
        require_serial: true
        pass_filenames: false

      - id: golangci-lint-full
        name: golangci-lint-full
        entry: golangci-lint run --fix
        language: golang
        types: [go]
        require_serial: true
        pass_filenames: false

      - id: golangci-lint-fmt
        name: golangci-lint-fmt
        entry: golangci-lint fmt
        language: golang
        types: [go]
        require_serial: true
        pass_filenames: false

      - id: golangci-lint-config-verify
        name: golangci-lint-config-verify
        entry: golangci-lint config verify -c src/.golangci.yml
        language: golang
        files: '^src/\.golangci\.(?:yml|yaml|toml|json)$'
        pass_filenames: false